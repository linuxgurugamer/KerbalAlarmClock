name: Update versioncheck.txt

on:
  push:
    branches:
      - master
      - main
    paths:
      - KerbalAlarmClock.version
      - .github/workflows/update-versioncheck.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versioncheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          path: source

      - name: Read KerbalAlarmClock.version
        id: version
        shell: bash
        run: |
          VERSION_FILE="source/KerbalAlarmClock.version"

          MAJOR=$(jq -r '.VERSION.MAJOR' "$VERSION_FILE")
          MINOR=$(jq -r '.VERSION.MINOR' "$VERSION_FILE")
          PATCH=$(jq -r '.VERSION.PATCH' "$VERSION_FILE")
          BUILD=$(jq -r '.VERSION.BUILD // 0' "$VERSION_FILE")

          if [ "$BUILD" = "0" ]; then
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          else
            VERSION="${MAJOR}.${MINOR}.${PATCH}.${BUILD}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Write versioncheck.txt
        shell: bash
        run: |
          echo "${{ steps.version.outputs.version }}" > gh-pages/versioncheck.txt

      - name: Commit and push gh-pages update
        shell: bash
        run: |
          cd gh-pages

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add versioncheck.txt

          if git diff --cached --quiet; then
            echo "No version change."
            exit 0
          fi

          git commit -m "Update versioncheck.txt to ${{ steps.version.outputs.version }}"
          git push
